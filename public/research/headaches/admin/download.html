<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Export — Kokun</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 48px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      text-align: center;
    }
    h1 { font-size: 1.25rem; font-weight: 600; color: #111; margin-bottom: 8px; }
    .subtitle { font-size: 0.875rem; color: #666; margin-bottom: 32px; }
    .stat { margin-bottom: 32px; }
    .stat-number { font-size: 3rem; font-weight: 700; color: #111; line-height: 1; }
    .stat-label { font-size: 0.875rem; color: #666; margin-top: 6px; }
    button {
      width: 100%;
      padding: 14px 24px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover:not(:disabled) { background: #333; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      font-size: 0.8125rem;
      color: #666;
      min-height: 20px;
    }
    .error { color: #c00; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Survey Responses</h1>
    <p class="subtitle">Headaches — Care Journey</p>

    <div class="stat">
      <div class="stat-number" id="count">—</div>
      <div class="stat-label">total responses</div>
    </div>

    <button id="dl-btn" disabled>Download CSV</button>
    <div class="status" id="status">Loading count…</div>
  </div>

  <script src="../config.js"></script>
  <script>
    const { url: BASE, anonKey: KEY } = SUPABASE_CONFIG;
    const HEADERS = { apikey: KEY, Authorization: 'Bearer ' + KEY, Prefer: 'count=exact' };

    async function fetchCount() {
      const r = await fetch(`${BASE}/rest/v1/survey_responses?select=id&limit=1`, {
        headers: { ...HEADERS }
      });
      if (!r.ok) throw new Error(await r.text());
      const raw = r.headers.get('content-range');
      // content-range: 0-0/TOTAL
      const total = raw ? parseInt(raw.split('/')[1], 10) : null;
      return isNaN(total) ? null : total;
    }

    async function fetchAllRows() {
      const PAGE = 1000;
      let offset = 0;
      let all = [];
      while (true) {
        const r = await fetch(
          `${BASE}/rest/v1/survey_responses?select=*&limit=${PAGE}&offset=${offset}`,
          { headers: { apikey: KEY, Authorization: 'Bearer ' + KEY } }
        );
        if (!r.ok) throw new Error(await r.text());
        const page = await r.json();
        all = all.concat(page);
        if (page.length < PAGE) break;
        offset += PAGE;
      }
      return all;
    }

    function toCSV(rows) {
      if (!rows.length) return '';
      const cols = Object.keys(rows[0]);
      const escape = v => {
        if (v == null) return '';
        const s = typeof v === 'object' ? JSON.stringify(v) : String(v);
        return s.includes(',') || s.includes('"') || s.includes('\n')
          ? '"' + s.replace(/"/g, '""') + '"'
          : s;
      };
      const header = cols.join(',');
      const body = rows.map(r => cols.map(c => escape(r[c])).join(',')).join('\n');
      return header + '\n' + body;
    }

    function downloadCSV(csv, filename) {
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    const countEl = document.getElementById('count');
    const btn = document.getElementById('dl-btn');
    const statusEl = document.getElementById('status');

    fetchCount()
      .then(n => {
        countEl.textContent = n != null ? n.toLocaleString() : '?';
        btn.disabled = false;
        statusEl.textContent = '';
      })
      .catch(e => {
        countEl.textContent = '?';
        statusEl.textContent = 'Could not load count.';
        statusEl.classList.add('error');
        console.error(e);
      });

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      statusEl.textContent = 'Fetching rows…';
      statusEl.classList.remove('error');
      try {
        const rows = await fetchAllRows();
        const csv = toCSV(rows);
        const date = new Date().toISOString().slice(0, 10);
        downloadCSV(csv, `survey_responses_${date}.csv`);
        statusEl.textContent = `Downloaded ${rows.length.toLocaleString()} rows.`;
      } catch (e) {
        statusEl.textContent = 'Download failed — see console for details.';
        statusEl.classList.add('error');
        console.error(e);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
